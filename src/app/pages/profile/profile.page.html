<ion-content class="profile-content">
  <div class="page-wrapper">
    <ion-card class="profile-card">
      <ion-card-header>
        <ion-card-title>Mi perfil</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <div class="avatar-box">
          <img *ngIf="profile.avatar" [src]="profile.avatar" class="avatar">
          <div *ngIf="!profile.avatar" class="avatar-placeholder">Sin foto</div>

          <ion-button expand="block" (click)="selectPhoto()">
            Elegir / sacar foto
          </ion-button>
        </div>

        <ion-item>
          <ion-input
            label="Nombre visible"
            labelPlacement="stacked"
            [(ngModel)]="profile.displayName">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-input
            label="Email"
            labelPlacement="stacked"
            [value]="email"
            readonly>
          </ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-label>Vibrar al equivocarse</ion-label>
          <ion-toggle [(ngModel)]="profile.vibrateOnError"></ion-toggle>
        </ion-item>

        <div class="stats">
          <p><strong>Partidas jugadas:</strong> {{ stats.gamesPlayed }}</p>
          <p><strong>Respuestas correctas:</strong> {{ stats.correctAnswers }}</p>
          <p><strong>Puntaje máximo:</strong> {{ stats.maxScore }}</p>
        </div>

        <ion-button expand="block" class="save-btn" (click)="saveProfile()">
          Guardar perfil
        </ion-button>

        <ion-button expand="block" fill="outline" (click)="goBack()">
          Volver
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
