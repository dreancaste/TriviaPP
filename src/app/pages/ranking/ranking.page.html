<ion-content class="ranking-content" [fullscreen]="true">
  <div class="page-wrapper">
    <ion-card class="ranking-card">
      <ion-card-header>
        <ion-card-title>Ranking Galáctico</ion-card-title>
        <ion-card-subtitle>Mejores comandantes del trivia</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <div class="empty-ranking" *ngIf="ranking.length === 0">
          Todavía no hay puntajes guardados.
          <span>La clasificación está vacía</span>
        </div>

        <div class="ranking-list" *ngIf="ranking.length > 0">
          <div
            class="ranking-item"
            *ngFor="let item of ranking; let i = index"
            [ngClass]="{
              'top-1': i === 0,
              'top-2': i === 1,
              'top-3': i === 2
            }"
          >
            <div class="rank-left">
              <div class="rank-pos">
                {{ i + 1 }}
              </div>

              <div class="rank-info">
                <p class="rank-name">{{ item.name || 'Jugador galáctico' }}</p>
                <p class="rank-detail">Posición en la clasificación</p>
              </div>
            </div>

            <div class="rank-score">
              {{ item.score }}
            </div>
          </div>
        </div>

        <ion-button expand="block" fill="outline" class="back-btn" (click)="goBack()">
          Volver
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
