<ion-content class="register-content" [fullscreen]="true">
  <div class="overlay">
    <ion-card class="register-card">
      <ion-card-header>
        <ion-card-title>Registro Jedi</ion-card-title>
        <ion-card-subtitle>Nueva identidad en la galaxia</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <div class="form-fields">
          <ion-item lines="none">
            <ion-input
              label="Email"
              labelPlacement="stacked"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="Ingresá tu email"
              [(ngModel)]="email">
            </ion-input>
          </ion-item>

          <ion-item lines="none">
            <ion-input
              label="Contraseña"
              labelPlacement="stacked"
              type="password"
              autocomplete="new-password"
              placeholder="Creá una contraseña"
              [(ngModel)]="password">
            </ion-input>
          </ion-item>
        </div>

        <p class="error-text" *ngIf="errorMessage">
          {{ errorMessage }}
        </p>

        <ion-button
          expand="block"
          class="main-btn"
          (click)="register()"
          [disabled]="loading">
          {{ loading ? 'Registrando...' : 'Crear cuenta' }}
        </ion-button>

        <ion-button
          expand="block"
          fill="outline"
          class="secondary-btn"
          (click)="goBack()"
          [disabled]="loading">
          Volver
        </ion-button>

        <div class="register-extra">
          Unite a la <span>alianza galáctica</span>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
